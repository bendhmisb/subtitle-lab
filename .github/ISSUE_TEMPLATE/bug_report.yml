name: Bug report
description: Report a problem with subtitle parsing, conversion, or validation.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the command you ran and a minimal subtitle sample.
      placeholder: |
        python subtitle_lab.py validate sample.srt
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: Minimal subtitle sample
      description: Do not include private subtitle files or secrets.
      render: text
    validations:
      required: false
